name: cafm
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+6

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.4.1
  device_info_plus: ^10.1.0
  flutter_local_notifications: ^17.1.2
  permission_handler: ^11.3.1
  # FIX: Updated from 0.13.6 to 1.x — old version causes release crashes
  http: ^1.2.1
  # FIX: Updated from 3.0.3 to 6.x — v3 has a known release-mode crash on Android
  # v6 also changes the API: checkConnectivity() now returns List<ConnectivityResult>
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/